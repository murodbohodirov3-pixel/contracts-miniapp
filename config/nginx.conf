server {
  listen 8080;
  server_name _;
  client_max_body_size 10m;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy same-origin always;

  location /api/ { proxy_pass http://api:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
  location /health/ { proxy_pass http://api:3000; }
  location / { try_files $uri $uri/ /index.html; }
}
